name: Brew Style Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  style-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ github.token }}

      - name: Style check
        run: |
          brew style --display-cop-names Casks/*.rb

      - name: Audit casks
        run: |
          for cask in Casks/*.rb; do
            token="${cask##*/}"
            token="${token%.rb}"
            brew audit --cask --strict --online "$token"
          done
